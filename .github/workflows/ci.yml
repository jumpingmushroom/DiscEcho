name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  daemon:
    name: daemon (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: daemon/go.sum
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt: $out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: daemon
      - name: tests
        run: go test ./... -race -count=1

  webui:
    name: webui (SvelteKit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml
      - name: install
        run: pnpm install --frozen-lockfile
      - name: format check
        run: pnpm format:check
      - name: typecheck
        run: pnpm check
      - name: build
        run: pnpm build

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [daemon, webui]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: discecho:ci-${{ github.sha }}
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
