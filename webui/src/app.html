<!doctype html>
<html lang="en" data-accent="aurora" data-mood="void" data-density="standard">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#00d68f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DiscEcho" />
    <title>DiscEcho</title>
    <script>
      (function () {
        try {
          var p = JSON.parse(localStorage.getItem('discecho.prefs') || '{}');
          var d = document.documentElement.dataset;
          if (p.accent) d.accent = p.accent;
          if (p.mood) d.mood = p.mood;
          if (p.density) d.density = p.density;
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body class="bg-bg text-text">
    <div id="app">%sveltekit.body%</div>
  </body>
</html>
